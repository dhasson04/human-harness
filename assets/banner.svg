<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace">
  <rect width="1200" height="520" fill="#0d1117"/>

  <!-- header -->
  <text x="80" y="74" font-size="42" font-weight="700" fill="#e6edf3">human-harness</text>
  <text x="82" y="108" font-size="18" fill="#8b949e">a focus harness for a human with ADHD. you are the model.</text>

  <!-- terminal window -->
  <rect x="80" y="146" width="1040" height="334" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <!-- title bar -->
  <circle cx="112" cy="176" r="7" fill="#ff5f56"/>
  <circle cx="136" cy="176" r="7" fill="#ffbd2e"/>
  <circle cx="160" cy="176" r="7" fill="#27c93f"/>
  <text x="600" y="181" font-size="13" fill="#6e7681" text-anchor="middle">human-harness · claude code</text>
  <line x1="80" y1="200" x2="1120" y2="200" stroke="#30363d" stroke-width="1"/>

  <!-- prompt -->
  <text x="116" y="240" font-size="17" fill="#8b949e">›<tspan fill="#58a6ff"> /human-harness</tspan> ship the auth PR, reply to Sarah</text>

  <!-- SYSTEM PROMPT card (the hero) -->
  <rect x="116" y="258" width="968" height="74" rx="6" fill="#0d1117" stroke="#3fb950" stroke-width="1.5"/>
  <text x="136" y="282" font-size="12" letter-spacing="1.5" fill="#3fb950">SYSTEM PROMPT</text>
  <text x="136" y="312" font-size="18" fill="#e6edf3">You are a focused senior software engineer. You ship. You do not open Twitter.</text>

  <!-- NEXT ACTION card -->
  <rect x="116" y="346" width="968" height="78" rx="6" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="136" y="370" font-size="12" letter-spacing="1.5" fill="#58a6ff">▶ NEXT ACTION</text>
  <text x="1064" y="370" font-size="13" fill="#6e7681" text-anchor="end">~3 min</text>
  <text x="136" y="400" font-size="18" fill="#e6edf3">Open the auth PR and read the 3 review comments.</text>

  <!-- controls -->
  <text x="136" y="456" font-size="16">
    <tspan fill="#3fb950">[d] done</tspan><tspan fill="#484f58">      </tspan><tspan fill="#d29922">[s] stuck</tspan><tspan fill="#484f58">      </tspan><tspan fill="#8b949e">[n] not now</tspan>
  </text>
  <text x="1064" y="456" font-size="13" fill="#6e7681" text-anchor="end">context window: 1 · status: distracted</text>
</svg>
