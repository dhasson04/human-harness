<svg xmlns="http://www.w3.org/2000/svg" width="720" height="300" viewBox="0 0 720 300" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace">
  <rect width="720" height="300" rx="12" fill="#0d1117"/>

  <!-- the rule, quiet -->
  <text x="360" y="48" font-size="12" fill="#6e7681" text-anchor="middle">system prompt: you are a focused senior software engineer. you do not open Twitter.</text>

  <!-- the one thing, alone -->
  <rect x="96" y="92" width="528" height="116" rx="10" fill="#0d1f33" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="120" y="126" font-size="12" letter-spacing="3" fill="#58a6ff">▶ NOW</text>
  <text x="600" y="126" font-size="12" fill="#6e7681" text-anchor="end">~3 min</text>
  <text x="120" y="164" font-size="20" fill="#e6edf3">Open the auth PR and read</text>
  <text x="120" y="192" font-size="20" fill="#e6edf3">the 3 review comments.</text>

  <!-- everything else: a count, not a list -->
  <text x="360" y="250" font-size="12" fill="#6e7681" text-anchor="middle">2 more after this</text>
  <text x="360" y="278" font-size="13" fill="#8b949e" text-anchor="middle">done       stuck       not now</text>
</svg>
